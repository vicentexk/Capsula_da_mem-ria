<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para você 💛</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Uma coisinha pra você 💛</h1>
<p class="sub">Você pode abrir quando quiser…</p>

<!-- BOTÕES -->
<h2>✨</h2>
<div class="botoes">
  <button onclick="mostrar('agora')" title="Abra agora">💌</button>
  <button onclick="mostrar('motivos')" title="O quanto eu gosto de você">🧠</button>
  <button onclick="mostrar('rir')" title="Quando quiser rir">😂</button>
  <button onclick="mostrar('momentos')" title="Nossos momentos">📸</button>
  <button onclick="mostrar('musica')" title="Uma música pra você">🎧</button>
  <button onclick="mostrar('segredo')" title="Uma coisa que eu nunca te falei">🤭</button>
</div>

<h2>🌙</h2>
<div class="botoes">
  <button onclick="mostrar('noite')" title="Antes de dormir">🌙</button>
  <button onclick="mostrar('pensando')" title="Se estiver pensando em mim">💭</button>
</div>

<h2>⏳</h2>
<div class="botoes">
  <button onclick="mostrar('saudade')" title="Quando estiver com saudade">💌</button>
  <button onclick="mostrar('triste')" title="Quando estiver triste">🌧️</button>
  <button onclick="mostrar('brava')" title="Quando estiver brava comigo">😡</button>
  <button onclick="mostrar('abraco')" title="Quando precisar de um abraço">🤍</button>
  <button onclick="mostrar('especial')" title="Quando quiser se sentir especial">🫶</button>
  <button onclick="mostrar('duvida')" title="Quando duvidar de nós">❓</button>
  <button onclick="mostrar('dia24')" title="Próximo dia 24">❤️</button>
  <button onclick="mostrar('surpresa')" title="Quando não estiver esperando nada">🎁</button>
</div>

<!-- CARROSSEL -->
<h2>📸 Nossas fotos</h2>
<div class="carrossel">
  <button onclick="anterior()">⬅</button>
  <img id="foto" src="foto1.jpg">
  <button onclick="proxima()">➡</button>
</div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <span class="fechar" onclick="fechar()">✖</span>
    <div id="conteudo"></div>
  </div>
</div>

<!-- MÚSICA -->
<audio id="musicaFundo" src="musica.mp3" loop></audio>

<script src="script.js"></script>

</body>
</html>

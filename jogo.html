<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jogo 💛</title>

<style>
body { margin:0; background:black; overflow:hidden; color:white; text-align:center;}
canvas { display:block; margin:auto; background:#222; image-rendering:pixelated;}

#final {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
}

.creditos {
  position:absolute;
  bottom:-100%;
  width:100%;
  animation:subir 15s linear forwards;
}

@keyframes subir { to { bottom:100%; } }

.fotos {
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
}

.fotos img {
  width:150px;
  height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="400"></canvas>

<div id="final">
  <div class="creditos">
    <h1>Noises 💛</h1>
    <p>feito por você</p>
    <p>pra ela 💛</p>
  </div>

  <div class="fotos">
    <img id="foto" src="foto1.jpg">
  </div>

  <audio id="musicaFinal" src="musica-final.mp3"></audio>
</div>

<script>
let c=document.getElementById("game");
let ctx=c.getContext("2d");

let p={x:180,y:350};
let goal={x:180,y:20};

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowUp")p.y-=20;
 if(e.key==="ArrowDown")p.y+=20;
 if(e.key==="ArrowLeft")p.x-=20;
 if(e.key==="ArrowRight")p.x+=20;
});

function loop(){
 ctx.clearRect(0,0,400,400);

 ctx.fillStyle="yellow";
 ctx.fillRect(p.x,p.y,20,20);

 ctx.fillStyle="pink";
 ctx.fillRect(goal.x,goal.y,20,20);

 if(p.y<=40){
  document.getElementById("game").style.display="none";
  document.getElementById("final").style.display="block";

  let m=document.getElementById("musicaFinal");
  m.volume=0.2;
  m.play();

  let fotos=["foto1.jpg","foto2.jpg","foto3.jpg"];
  let i=0;

  setInterval(()=>{
    i=(i+1)%fotos.length;
    document.getElementById("foto").src=fotos[i];
  },2000);

  return;
 }

 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
